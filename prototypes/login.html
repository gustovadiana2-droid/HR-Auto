<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR-Auto - Вход в систему</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center" style="background-color: #F0F2FF;">
    <!-- Градиентная панель -->
    <div class="fixed top-0 left-0 w-full" style="height: 280px; background-color: #7E22CE;"></div>

    <!-- Карточка входа -->
    <div class="relative bg-white shadow-2xl w-full max-w-md" style="margin-top: 60px; padding: 0; width: 430px;">
        <!-- Заголовок градиентной панели -->
        <div
            style="background-color: #7E22CE; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: -60px 0 0 0; padding-top: 40px;">
            <h1 style="font-size: 42px; font-weight: bold; color: white; margin: 0;">HR-Auto</h1>
            <p style="font-size: 13px; color: #DCDCFF; margin: 10px 0 0 0;">Система автоматизированного документооборота
            </p>
        </div>

        <div class="p-8">
            <h2 style="font-size: 18px; font-weight: bold; color: #2D2A61; margin-bottom: 20px;">Вход в аккаунт</h2>

            <div class="mb-4">
                <label
                    style="font-size: 10px; font-weight: bold; color: #2D2A61; display: block; margin-bottom: 5px;">Логин</label>
                <input type="text" value="ivanov"
                    style="width: 100%; padding: 10px; border: 1px solid #D1D5DB; background-color: #F8F9FF; color: #6C758D; font-size: 10.5px; box-sizing: border-box;"
                    placeholder="Введите ваш логин">
            </div>

            <div class="mb-6">
                <label
                    style="font-size: 10px; font-weight: bold; color: #2D2A61; display: block; margin-bottom: 5px;">Пароль</label>
                <input type="password" value="admin123"
                    style="width: 100%; padding: 10px; border: 1px solid #D1D5DB; background-color: #F8F9FF; color: #6C758D; font-size: 10.5px; box-sizing: border-box;"
                    placeholder="Введите ваш пароль">
            </div>

            <button
                style="width: 100%; padding: 12px; background-color: #7E22CE; color: white; border: none; font-size: 10px; font-weight: bold; cursor: pointer;"
                onmouseover="this.style.backgroundColor='#6B1FA9'" onmouseout="this.style.backgroundColor='#7E22CE'">
                Войти в систему
            </button>

            <div style="text-align: center; margin-top: 20px;">
                <a href="#" style="color: #7E22CE; font-size: 9px; text-decoration: none;">Забыли пароль?</a>
                <span style="color: #9CA3AF; margin: 0 8px;">|</span>
                <a href="2.txt"
                    style="color: #7E22CE; font-size: 9px; font-weight: bold; text-decoration: none;">Создать
                    аккаунт</a>
            </div>
        </div>
    </div>
</body>

</html>
